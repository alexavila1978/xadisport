<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XadiSport Premium</title>
<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:#fff}
header{padding:20px;text-align:center}
.logo{font-size:38px;font-weight:bold;color:#00ffcc}
.banner{background:#111;padding:10px;text-align:center;color:#00ffcc}
.promo{background:#00ffcc;color:#000;padding:12px;text-align:center;font-weight:bold}
.products{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px}
.card{background:#fff;color:#000;border-radius:14px;padding:10px;text-align:center;box-shadow:0 0 10px rgba(0,0,0,0.3)}
.card img{width:100%;border-radius:10px}
button{padding:10px;border:none;border-radius:8px;background:#000;color:#fff;width:100%;margin-top:5px}
.cart{position:fixed;bottom:10px;right:10px;background:#00ffcc;color:#000;padding:12px;border-radius:50px;font-weight:bold}
.info{position:fixed;bottom:70px;right:10px;background:#fff;color:#000;padding:10px;border-radius:50px;font-weight:bold}
.admin{background:#111;padding:10px;margin:10px;border-radius:10px;text-align:center}
.footer{text-align:center;color:#aaa;margin:20px}
</style>
</head>
<body><header>
<div class="logo">⚡ XadiSport ⚡</div>
<p>Tienda Premium de Jerseys</p>
</header><div class="banner">🚀 Entregas en Matamoros | Personalización disponible</div>
<div class="promo">🔥 2 Jerseys Selección por $900 🔥</div><div class="admin">
<p>🔒 Subir fotos reales</p>
<input type="file" id="upload" accept="image/*">
</div><div class="products" id="products"></div><div class="cart" onclick="sendCart()">🛒 Enviar pedido</div>
<div class="info" onclick="sendInfo()">ℹ️ Info</div><div class="footer">© 2026 XadiSport Premium</div><script>
const phone="5218683095612";
let cart=[];

const products=[
{team:"América",img:"https://via.placeholder.com/200?text=America"},
{team:"Chivas",img:"https://via.placeholder.com/200?text=Chivas"},
{team:"Cruz Azul",img:"https://via.placeholder.com/200?text=Cruz+Azul"},
{team:"Pumas",img:"https://via.placeholder.com/200?text=Pumas"},
{team:"Tigres",img:"https://via.placeholder.com/200?text=Tigres"},
{team:"Monterrey",img:"https://via.placeholder.com/200?text=Rayados"},
{team:"Barcelona",img:"https://via.placeholder.com/200?text=Barcelona"},
{team:"Real Madrid",img:"https://via.placeholder.com/200?text=Real+Madrid"}
];

const container=document.getElementById('products');

products.forEach(p=>{
let card=document.createElement('div');
card.className='card';
card.innerHTML=`
<img src="${p.img}">
<h3>${p.team}</h3>
<button onclick="addToCart('${p.team}')">Agregar</button>
`;
container.appendChild(card);
});

function addToCart(team){
cart.push(team);
alert(team+" agregado al carrito");
}

function sendCart(){
if(cart.length===0){alert("Carrito vacío");return;}

let address = prompt("Ingresa tu dirección o punto de entrega en Matamoros:");
if(!address){alert("Debes ingresar dirección o punto de entrega");return;}

let msg="Hola, ya realicé mi pedido:%0A";
cart.forEach(item=>{msg+="- "+item+"%0A"});
msg+=`%0ADirección/Punto de entrega: ${address}`;
msg+="%0AForma de pago: Transferencia";

let url=`https://wa.me/${phone}?text=${msg}`;
window.open(url,'_blank');
}

function sendInfo(){
let msg="Hola, quiero más información sobre jerseys disponibles";
let url=`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
window.open(url,'_blank');
}

// subir imagen
const upload=document.getElementById('upload');
upload.addEventListener('change',function(){
const file=this.files[0];
if(file){
const reader=new FileReader();
reader.onload=function(e){
let img=document.createElement('img');
img.src=e.target.result;
img.style.width='100%';
document.body.insertBefore(img, document.querySelector('.products'));
}
reader.readAsDataURL(file);
}
});
</script></body>
</html>
